services:
  # Webapp — FastAPI + MD3 frontend (default)
  webapp:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - webapp_data:/home/appuser/app/webapp/data

  # CLI mode — interactive terminal
  tradingagents:
    build: .
    entrypoint: ["tradingagents"]
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - webapp_data:/home/appuser/app/webapp/data
    tty: true
    stdin_open: true
    profiles:
      - cli

  # Ollama (optional local LLM)
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  # CLI with Ollama backend
  tradingagents-ollama:
    build: .
    entrypoint: ["tradingagents"]
    env_file:
      - .env
    environment:
      - TRADINGAGENTS_LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - webapp_data:/home/appuser/app/webapp/data
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
  webapp_data:
    profiles:
      - ollama

